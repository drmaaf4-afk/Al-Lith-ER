<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Hospital Duty Planner</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="header-box">

<img class="header-logo"
src="https://incyqbermouxcrusmzby.supabase.co/storage/v1/object/public/assets/logo.png">

<div class="header-ar">مستشفى الليث</div>

<div class="header-en">Al-Lith Hospital</div>

<div class="header-sub" id="headerSub">Doctor Duty Planner</div>

</div>

<div class="box">

<h1 id="mainTitle">Hospital Duty Planner</h1>

<div class="row">

<a class="nav-link" href="planner.html">Open Planner</a>

<a class="nav-link" href="summary.html">Open Summary</a>

</div>

</div>


<div class="box">

<h2>Month</h2>

<select id="monthSelect" onchange="handleMonthDropdownChange()"></select>

</div>


<div class="box">

<h2>Doctor Access</h2>

<div class="row">

<input id="signup_email" placeholder="Doctor name or email">

<input id="signup_password" type="password" placeholder="Password">

</div>

<div class="row">

<button class="primary" onclick="signup()">Sign up</button>

<button class="primary" onclick="login()">Log in</button>

<button class="danger" onclick="logoutDoctor()">Log out</button>

</div>

<div id="authStatus" class="status"></div>

</div>


<div class="box">

<h2>Current Doctor</h2>

<div id="currentDoctorBox" class="muted">Current doctor: none</div>

</div>

<script src="app.js"></script>

<script>
initShared();
</script>

</body>
</html>
