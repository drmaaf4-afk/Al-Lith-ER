<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="pageTitle">Emergency Department Planner</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

  <style>
    body{
      font-family:Arial,sans-serif;
      max-width:900px;
      margin:auto;
      background:#e6ebf7;
      padding:20px;
      color:#1f2937;
    }

    h1,h2,h3{
      margin-top:0;
    }

    .header-box{
      background:#2f3f86;
      border-radius:18px;
      padding:24px 18px;
      margin-bottom:16px;
      box-shadow:0 6px 18px rgba(47,63,134,0.18);
      text-align:center;
    }

    .header-logo{
      width:140px;
      max-width:100%;
      height:auto;
      margin-bottom:12px;
    }

    .header-ar{
      font-size:28px;
      font-weight:bold;
      color:#ffffff;
      margin:0 0 6px 0;
      direction:rtl;
    }

    .header-en{
      font-size:30px;
      font-weight:bold;
      color:#ffffff;
      margin:0 0 8px 0;
    }

    .header-sub{
      color:#dbe4ff;
      font-size:16px;
      font-weight:600;
      margin:0;
    }

    .box{
      background:#ffffff;
      border-radius:16px;
      padding:16px;
      margin-bottom:16px;
      box-shadow:0 4px 14px rgba(47,63,134,0.08);
      border:1px solid #d7deef;
    }

    .row{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
      margin-bottom:10px;
    }

    input,button,select{
      padding:10px 12px;
      font-size:16px;
      border-radius:10px;
    }

    input,select{
      border:1px solid #c8d3eb;
      min-width:220px;
      background:#ffffff;
      color:#1f2937;
    }

    button{
      border:none;
      cursor:pointer;
      font-weight:600;
    }

    .primary{
      background:#4b5ea6;
      color:white;
    }

    .secondary{
      background:#e6ebf7;
      color:#2f3f86;
    }

    .danger{
      background:#e6ebf7;
      color:#2f3f86;
    }

    .admin{
      background:#4b5ea6;
      color:white;
    }

    .leader-btn{
      background:#d6dcf0;
      color:#2f3f86;
    }

    .oncall-btn{
      background:#d6dcf0;
      color:#2f3f86;
    }

    .status{
      min-height:20px;
      margin-top:8px;
      font-size:14px;
      color:#2f3f86;
    }

    .muted{
      color:#6b7280;
      font-size:14px;
    }

    .summary-link{
      color:#3f57a6;
      cursor:pointer;
      font-weight:600;
    }

    .nav-links{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .nav-links a{
      display:inline-block;
      padding:10px 14px;
      background:#dfe6fb;
      border-radius:12px;
      text-decoration:none;
      color:#2f3f86;
      font-weight:bold;
      border:1px solid #cfd8f5;
    }

    .day-box{
      background:#ffffff;
      border-radius:16px;
      padding:14px;
      margin-bottom:14px;
      box-shadow:0 4px 14px rgba(47,63,134,0.08);
      border:1px solid #d7deef;
    }

    .day-toggle{
      display:flex;
      justify-content:space-between;
      align-items:center;
      cursor:pointer;
      user-select:none;
      margin:0;
      padding:4px 0;
    }

    .day-arrow{
      font-size:18px;
      font-weight:bold;
      color:#6b7280;
    }

    .day-content{
      display:none;
      margin-top:10px;
    }

    .day-content.open{
      display:block;
    }

    .shift-row{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      background:#f7f9fe;
      border:1px solid #dde4f3;
      border-radius:12px;
      padding:10px;
      margin-top:8px;
      flex-wrap:wrap;
    }

    .shift-left{
      flex:1;
      min-width:240px;
    }

    .time-badge{
      display:inline-block;
      min-width:76px;
      font-weight:bold;
      color:#2f3f86;
      margin-right:8px;
    }

    .doctor-chip{
      display:inline-flex;
      align-items:center;
      gap:6px;
      margin:4px;
      padding:4px 8px;
      border-radius:999px;
      background:#edf2ff;
      color:#2f3f86;
      flex-wrap:wrap;
    }

    .mine{
      color:#4b5ea6;
      font-weight:bold;
    }

    .leader-chip{
      background:#d6dcf0;
      color:#2f3f86;
      border:1px solid #bfc7e6;
      font-weight:bold;
    }

    .oncall-chip{
      background:#d6dcf0;
      color:#2f3f86;
      border:1px solid #bfc7e6;
      font-weight:bold;
    }

    .leader-label{
      font-size:12px;
      font-weight:bold;
      color:#2f3f86;
      background:#c7d0ec;
      padding:2px 6px;
      border-radius:999px;
      margin-left:4px;
    }

    .oncall-label{
      font-size:12px;
      font-weight:bold;
      color:#2f3f86;
      background:#c7d0ec;
      padding:2px 6px;
      border-radius:999px;
      margin-left:4px;
    }

    .admin-badge{
      display:inline-block;
      margin-left:8px;
      padding:2px 8px;
      border-radius:999px;
      font-size:12px;
      font-weight:bold;
      background:#e0e7ff;
      color:#2f3f86;
    }

    .chip-remove{
      background:#dfe6fb;
      color:#2f3f86;
      padding:4px 8px;
      font-size:12px;
      border-radius:999px;
    }

    .chip-leader{
      background:#d6dcf0;
      color:#2f3f86;
      padding:4px 8px;
      font-size:12px;
      border-radius:999px;
    }

    .chip-oncall{
      background:#d6dcf0;
      color:#2f3f86;
      padding:4px 8px;
      font-size:12px;
      border-radius:999px;
    }

    #adminBox{
      display:none;
    }

    #toast,
    .toast{
      position:fixed;
      left:50%;
      bottom:20px;
      transform:translateX(-50%) translateY(20px);
      min-width:240px;
      max-width:90vw;
      padding:12px 16px;
      border-radius:12px;
      color:white;
      font-weight:bold;
      background:#4b5ea6;
      box-shadow:0 8px 20px rgba(0,0,0,0.18);
      opacity:0;
      transition:all 0.25s ease;
      z-index:9999;
      text-align:center;
      pointer-events:none;
      display:block;
    }

    #toast.show,
    .toast.show{
      opacity:1;
      transform:translateX(-50%) translateY(0);
    }

    @media (max-width: 700px){
      body{
        padding:14px;
      }

      .row{
        flex-direction:column;
        align-items:stretch;
      }

      button,
      select{
        width:100%;
      }
    }
  </style>
</head>

<body>

  <div class="header-box">
    <img
      class="header-logo"
      src="https://incyqbermouxcrusmzby.supabase.co/storage/v1/object/public/assets/logo.png"
      alt="Al-Lith Hospital Logo"
    >
    <div class="header-ar">مستشفى الليث</div>
    <div class="header-en">Al-Lith Hospital</div>
    <div class="header-sub">Emergency Department Planner</div>
  </div>

  <div class="box">
    <div class="muted">4-hour shifts</div>
    <div class="muted">Max 3 shifts per day</div>
  </div>

  <div class="box">
    <h2>Navigation</h2>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="planner.html">Planner</a>
      <a href="summary.html">Summary</a>
    </div>
  </div>

  <div class="box">
    <h2>Month Selection</h2>
    <div class="row">
      <select id="monthSelect" onchange="handleMonthDropdownChange()"></select>
    </div>
  </div>

  <div class="box">
    <h2>Current Doctor</h2>
    <div id="currentDoctorBox" class="muted">Current doctor: none</div>
    <div id="plannerStatus" class="status"></div>
  </div>

  <div class="box" id="adminBox" style="display:none;">
    <h2 class="summary-link" onclick="toggleAdminBox()">Admin Mode</h2>

    <div id="adminContent" style="display:none;">
      <div class="muted">Visible only for users with is_admin = TRUE.</div>

      <div class="row">
        <select id="adminDoctor"></select>
        <select id="adminDay"></select>
        <select id="adminTime"></select>
        <button class="admin" onclick="adminAddShift()">Add shift for doctor</button>
      </div>

      <div class="row">
        <select id="leaderDoctor"></select>
        <select id="leaderDay"></select>
        <select id="leaderTime"></select>
        <button class="leader-btn" onclick="setShiftLeader()">Set shift leader</button>
        <button class="secondary" onclick="clearShiftLeader()">Clear leader</button>
      </div>

      <div class="row">
        <select id="onCallDoctor"></select>
        <select id="onCallDay"></select>
        <select id="onCallTime"></select>
        <button class="oncall-btn" onclick="setOnCallDoctor()">Add on call</button>
        <button class="secondary" onclick="clearOnCallDoctor()">Clear all on call</button>
      </div>

      <div class="row">
        <select id="adminClearDay"></select>
        <button class="danger" onclick="clearSelectedDay()">Clear selected day</button>
        <button class="danger" onclick="clearAllBookings()">Clear all bookings</button>
      </div>

      <div id="adminStatus" class="status"></div>
    </div>
  </div>

  <div class="box">
    <div class="row">
      <button class="secondary" onclick="refreshAll()">Refresh planner</button>
      <button class="danger" onclick="clearMyBookings()">Clear my bookings</button>
    </div>
  </div>

  <div id="calendar"></div>
  <div id="toast"></div>

  <script src="app.js"></script>
  <script>
    function renderCalendar(){
      const calendar = document.getElementById('calendar');
      if(!calendar) return;

      let html = '';
      const days = getCurrentDaysArray();

      for(const day of days){
        const isOpen = !!openDays[day];

        html += `<div class="day-box">`;
        html += `
          <h3 class="day-toggle" onclick="toggleDay(${day})">
            <span>${getCurrentMonthName()} ${day}</span>
            <span class="day-arrow">${isOpen ? '−' : '+'}</span>
          </h3>
        `;

        html += `<div class="day-content ${isOpen ? 'open' : ''}">`;

        for(const time of TIMES){
          const doctors = getShiftDoctors(day, time);
          const leader = getShiftLeader(day, time);
          const onCallList = getShiftOnCall(day, time);
          const mine = currentDoctor && doctors.includes(currentDoctor);

          html += `
            <div class="shift-row">
              <div class="shift-left">
                <span class="time-badge">${time}</span>
                <span>
          `;

          if(doctors.length){
            doctors.forEach(doctor => {
              const isLeader = doctor === leader;
              const isOnCall = onCallList.includes(doctor);

              let extraClasses = '';
              if(isLeader) extraClasses += ' leader-chip';
              if(isOnCall) extraClasses += ' oncall-chip';

              html += `
                <span class="doctor-chip${extraClasses}">
                  <span>${escapeHtml(doctor)}</span>
                  ${isLeader ? '<span class="leader-label">Leader</span>' : ''}
                  ${isOnCall ? '<span class="oncall-label">On Call</span>' : ''}
                  ${doctor === currentDoctor ? '<span class="mine"> booked by you</span>' : ''}
                  ${currentIsAdmin ? `<button class="chip-remove" onclick='removeSpecificBooking(${day}, ${JSON.stringify(time)}, ${JSON.stringify(doctor)})'>Remove</button>` : ''}
                  ${currentIsAdmin && !isLeader ? `<button class="chip-leader" onclick='adminSetLeaderDirect(${day}, ${JSON.stringify(time)}, ${JSON.stringify(doctor)})'>Make leader</button>` : ''}
                  ${currentIsAdmin && !isOnCall ? `<button class="chip-oncall" onclick='adminSetOnCallDirect(${day}, ${JSON.stringify(time)}, ${JSON.stringify(doctor)})'>Add on call</button>` : ''}
                  ${currentIsAdmin && isOnCall ? `<button class="chip-remove" onclick='removeSingleOnCallDoctor(${day}, ${JSON.stringify(time)}, ${JSON.stringify(doctor)})'>Remove on call</button>` : ''}
                </span>
              `;
            });
          } else {
            html += `Available`;
          }

          html += `
                </span>
              </div>
              <div>
          `;

          if(!currentDoctor){
            html += `<button class="secondary" disabled>Login first</button>`;
          } else if(mine){
            html += `<button class="secondary" onclick="removeMyBooking(${day}, '${time}')">Remove mine</button>`;
          } else {
            html += `<button class="primary" onclick="reserveShift(${day}, '${time}')">Reserve</button>`;
          }

          html += `
              </div>
            </div>
          `;
        }

        html += `</div>`;
        html += `</div>`;
      }

      calendar.innerHTML = html;
    }

    async function refreshAll(){
      await loadCurrentDoctorFromSession();
      await loadDoctors();
      await loadBookings();
      setPlannerStatus('Planner refreshed.');
      showToast('Planner refreshed.', 'info');
    }

    async function init(){
      await initShared();
      setPlannerStatus('Planner loaded.');
    }

    init();
  </script>

</body>
</html>
