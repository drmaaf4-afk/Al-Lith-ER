<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="pageTitle">Emergency Department Planner</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

  <style>
    body{
      font-family:Arial,sans-serif;
      max-width:900px;
      margin:auto;
      background:#e6ebf7;
      padding:20px;
      color:#1f2937;
    }

    h1,h2,h3{
      margin-top:0;
    }

    .header-box{
      background:#2f3f86;
      border-radius:18px;
      padding:24px 18px;
      margin-bottom:16px;
      box-shadow:0 6px 18px rgba(47,63,134,0.18);
      text-align:center;
    }

    .header-logo{
      width:140px;
      max-width:100%;
      margin-bottom:12px;
    }

    .header-ar{
      font-size:28px;
      font-weight:bold;
      color:#ffffff;
      direction:rtl;
    }

    .header-en{
      font-size:30px;
      font-weight:bold;
      color:#ffffff;
    }

    .header-sub{
      color:#dbe4ff;
      font-size:16px;
      font-weight:600;
    }

    .box{
      background:#ffffff;
      border-radius:16px;
      padding:16px;
      margin-bottom:16px;
      box-shadow:0 4px 14px rgba(47,63,134,0.08);
      border:1px solid #d7deef;
    }

    .row{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-bottom:10px;
    }

    input,button,select{
      padding:10px 12px;
      font-size:16px;
      border-radius:10px;
    }

    input,select{
      border:1px solid #c8d3eb;
      min-width:220px;
    }

    button{
      border:none;
      cursor:pointer;
      font-weight:600;
    }

    .primary{ background:#4b5ea6; color:white; }
    .secondary{ background:#e6ebf7; color:#2f3f86; }
    .danger{ background:#e6ebf7; color:#2f3f86; }

    .status{ min-height:20px; margin-top:8px; font-size:14px; }
    .muted{ color:#6b7280; font-size:14px; }

    .day-box{
      background:#ffffff;
      border-radius:16px;
      padding:14px;
      margin-bottom:14px;
      border:1px solid #d7deef;
    }

    .day-toggle{
      display:flex;
      justify-content:space-between;
      cursor:pointer;
    }

    .day-content{ display:none; margin-top:10px; }
    .day-content.open{ display:block; }

    .shift-row{
      display:flex;
      justify-content:space-between;
      background:#f7f9fe;
      border-radius:12px;
      padding:10px;
      margin-top:8px;
    }

    .time-badge{
      font-weight:bold;
      color:#2f3f86;
      margin-right:8px;
    }

    .doctor-chip{
      display:inline-block;
      margin:4px;
      padding:4px 8px;
      border-radius:999px;
      background:#edf2ff;
    }

    #toast{
      position:fixed;
      left:50%;
      bottom:20px;
      transform:translateX(-50%);
      padding:12px;
      border-radius:12px;
      background:#4b5ea6;
      color:white;
      display:none;
    }
  </style>
</head>

<body>

  <div class="header-box">
    <img class="header-logo"
      src="https://incyqbermouxcrusmzby.supabase.co/storage/v1/object/public/assets/logo.png">
    <div class="header-ar">مستشفى الليث</div>
    <div class="header-en">Al-Lith Hospital</div>
    <div class="header-sub">Emergency Department Planner</div>
  </div>

  <div class="box">
    <div class="muted">4-hour shifts</div>
    <div class="muted">Max 3 shifts per day</div>
  </div>

  <div class="box">
    <h2>Navigation</h2>
    <div class="row">
      <a href="index.html">Home</a>
      <a href="planner.html">Planner</a>
      <a href="summary.html">Summary</a>
    </div>
  </div>

  <div class="box">
    <h2>Month Selection</h2>
    <select id="monthSelect" onchange="handleMonthDropdownChange()"></select>
  </div>

  <div class="box">
    <h2>Current Doctor</h2>
    <div id="currentDoctorBox">Current doctor: none</div>
    <div id="plannerStatus"></div>
  </div>

  <div class="box">
    <button class="secondary" onclick="refreshAll()">Refresh planner</button>
    <button class="danger" onclick="clearMyBookings()">Clear my bookings</button>
  </div>

  <div id="calendar"></div>

  <script src="app.js"></script>
  <script>
    async function refreshAll(){
      await loadCurrentDoctorFromSession();
      await loadDoctors();
      await loadBookings();
    }

    async function init(){
      await initShared();
    }

    init();
  </script>

</body>
</html>
