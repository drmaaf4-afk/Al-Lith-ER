<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="pageTitle">Emergency Department Planner</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div id="sharedHeader"></div>

  <div class="box">
    <div class="muted">4-hour shifts</div>
    <div class="muted">Max 3 shifts per day</div>
  </div>

  <div class="box">
    <h2>Navigation</h2>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="planner.html">Planner</a>
      <a href="summary.html">Summary</a>
    </div>
  </div>

  <div class="box">
    <h2>Month Selection</h2>
    <div class="row">
      <select id="monthSelect" onchange="handleMonthDropdownChange()"></select>
    </div>
  </div>

  <div class="box">
    <h2>Current Doctor</h2>
    <div id="currentDoctorBox" class="muted">Current doctor: none</div>
    <div id="plannerStatus" class="status"></div>
  </div>

  <div class="box" id="adminBox" style="display:none;">
    <h2 class="summary-link" onclick="toggleAdminBox()">Admin Mode</h2>

    <div id="adminContent" style="display:none;">
      <div class="muted">Visible only for users with is_admin = TRUE.</div>

      <div class="row">
        <select id="adminDoctor"></select>
        <select id="adminDay"></select>
        <select id="adminTime"></select>
        <button class="admin" onclick="adminAddShift()">Add shift for doctor</button>
      </div>

      <div class="row">
        <select id="leaderDoctor"></select>
        <select id="leaderDay"></select>
        <select id="leaderTime"></select>
        <button class="leader-btn" onclick="setShiftLeader()">Set shift leader</button>
        <button class="secondary" onclick="clearShiftLeader()">Clear leader</button>
      </div>

      <div class="row">
        <select id="onCallDoctor"></select>
        <select id="onCallDay"></select>
        <select id="onCallTime"></select>
        <button class="oncall-btn" onclick="setOnCallDoctor()">Add on call</button>
        <button class="secondary" onclick="clearOnCallDoctor()">Clear all on call</button>
      </div>

      <div class="row">
        <select id="adminClearDay"></select>
        <button class="danger" onclick="clearSelectedDay()">Clear selected day</button>
        <button class="danger" onclick="clearAllBookings()">Clear all bookings</button>
      </div>

      <div id="adminStatus" class="status"></div>
    </div>
  </div>

  <div class="box">
    <div class="row">
      <button class="secondary" onclick="refreshAll()">Refresh planner</button>
      <button class="danger" onclick="clearMyBookings()">Clear my bookings</button>
    </div>
  </div>

  <div id="calendar"></div>
  <div id="toast"></div>

  <script src="app.js"></script>
  <script src="header.js"></script>
  <script>
    function renderCalendar(){
      const calendar = document.getElementById('calendar');
      if(!calendar) return;

      let html = '';
      const days = getCurrentDaysArray();

      for(const day of days){
        const isOpen = !!openDays[day];

        html += `<div class="day-box">`;
        html += `
          <h3 class="day-toggle" onclick="toggleDay(${day})">
            <span>${getCurrentMonthName()} ${day}</span>
            <span class="day-arrow">${isOpen ? '−' : '+'}</span>
          </h3>
        `;

        html += `<div class="day-content ${isOpen ? 'open' : ''}">`;

        for(const time of TIMES){
          const doctors = getShiftDoctors(day, time);
          const leader = getShiftLeader(day, time);
          const onCallList = getShiftOnCall(day, time);
          const mine = currentDoctor && doctors.includes(currentDoctor);

          html += `
            <div class="shift-row">
              <div class="shift-left">
                <span class="time-badge">${time}</span>
                <span>
          `;

          if(doctors.length){
            doctors.forEach(doctor => {
              const isLeader = doctor === leader;
              const isOnCall = onCallList.includes(doctor);

              let extraClasses = '';
              if(isLeader) extraClasses += ' leader-chip';
              if(isOnCall) extraClasses += ' oncall-chip';

              html += `
                <span class="doctor-chip${extraClasses}">
                  <span>${escapeHtml(doctor)}</span>
                  ${isLeader ? '<span class="leader-label">Leader</span>' : ''}
                  ${isOnCall ? '<span class="oncall-label">On Call</span>' : ''}
                  ${doctor === currentDoctor ? '<span class="mine"> booked by you</span>' : ''}
                  ${currentIsAdmin ? `<button class="chip-remove" onclick='removeSpecificBooking(${day}, ${JSON.stringify(time)}, ${JSON.stringify(doctor)})'>Remove</button>` : ''}
                  ${currentIsAdmin && !isLeader ? `<button class="chip-leader" onclick='adminSetLeaderDirect(${day}, ${JSON.stringify(time)}, ${JSON.stringify(doctor)})'>Make leader</button>` : ''}
                  ${currentIsAdmin && !isOnCall ? `<button class="chip-oncall" onclick='adminSetOnCallDirect(${day}, ${JSON.stringify(time)}, ${JSON.stringify(doctor)})'>Add on call</button>` : ''}
                  ${currentIsAdmin && isOnCall ? `<button class="chip-remove" onclick='removeSingleOnCallDoctor(${day}, ${JSON.stringify(time)}, ${JSON.stringify(doctor)})'>Remove on call</button>` : ''}
                </span>
              `;
            });
          } else {
            html += `Available`;
          }

          html += `
                </span>
              </div>
              <div>
          `;

          if(!currentDoctor){
            html += `<button class="secondary" disabled>Login first</button>`;
          } else if(mine){
            html += `<button class="secondary" onclick="removeMyBooking(${day}, '${time}')">Remove mine</button>`;
          } else {
            html += `<button class="primary" onclick="reserveShift(${day}, '${time}')">Reserve</button>`;
          }

          html += `
              </div>
            </div>
          `;
        }

        html += `</div>`;
        html += `</div>`;
      }

      calendar.innerHTML = html;
    }

    async function refreshAll(){
      await loadCurrentDoctorFromSession();
      await loadDoctors();
      await loadBookings();
      renderCalendar();
      setPlannerStatus('Planner refreshed.');
      showToast('Planner refreshed.', 'info');
    }

    async function init(){
      await initShared();
      renderHeader('Emergency Department Planner');
      renderCalendar();
      setPlannerStatus('Planner loaded.');
    }

    init();
  </script>

</body>
</html>
