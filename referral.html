<!DOCTYPE html>
<html>
<head>
  <title>Referral On-Call Booking</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body{
      font-family: Arial;
      background:#f4f6fb;
      padding:20px;
      max-width:600px;
      margin:auto;
      color:#1f2937;
    }

    h1{
      text-align:center;
      margin-bottom:20px;
    }

    input, button{
      width:100%;
      padding:12px;
      margin-top:10px;
      border-radius:10px;
      border:1px solid #ccc;
      font-size:16px;
    }

    button{
      background:#2f3f86;
      color:white;
      border:none;
      font-weight:bold;
      cursor:pointer;
    }

    button:hover{
      opacity:0.9;
    }

    .card{
      background:white;
      padding:12px;
      margin-top:10px;
      border-radius:12px;
      box-shadow:0 2px 6px rgba(0,0,0,0.1);
    }

    .success{
      color:green;
      margin-top:10px;
    }

    .error{
      color:red;
      margin-top:10px;
    }
  </style>
</head>

<body>

<h1>Referral On-Call</h1>

<!-- LOGIN -->
<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Password">
<button onclick="login()">Login</button>

<div id="msg"></div>

<hr>

<!-- BOOKING -->
<input type="date" id="date">
<button onclick="book()">Book 24h Shift (08 → 08)</button>

<h3>All Bookings</h3>
<div id="list"></div>

<script>
const supabase = window.supabase.createClient(
  "https://incyqbermouxcrusmzby.supabase.co",
  "sb_publishable_l003s4eZYDjpXjrqft_2VQ_ECLSe5bs"
);

let currentUser = null;

// LOGIN
async function login(){
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { data, error } = await supabase.auth.signInWithPassword({
    email,
    password
  });

  if(error){
    showError(error.message);
    return;
  }

  currentUser = data.user;
  showSuccess("Logged in successfully");

  loadBookings();
}

// BOOK SHIFT
async function book(){
  if(!currentUser){
    showError("Please login first");
    return;
  }

  const date = document.getElementById("date").value;

  if(!date){
    showError("Please select a date");
    return;
  }

  const { error } = await supabase
    .from("referral_bookings")
    .insert({
      doctor_id: currentUser.id,
      shift_date: date
    });

  if(error){
    showError("Already booked or error");
    return;
  }

  showSuccess("Shift booked successfully");

  loadBookings();
}

// LOAD BOOKINGS
async function loadBookings(){
  const { data, error } = await supabase
    .from("referral_bookings")
    .select(`
      shift_date,
      doctors (
        name
      )
    `)
    .order("shift_date", { ascending: true });

  if(error){
    showError(error.message);
    return;
  }

  const list = document.getElementById("list");
  list.innerHTML = "";

  if(!data || data.length === 0){
    list.innerHTML = "<p>No bookings yet</p>";
    return;
  }

  data.forEach(item=>{
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <b>${item.shift_date}</b><br>
      Doctor: ${item.doctors?.name || "Unknown"}
    `;

    list.appendChild(div);
  });
}

// UI HELPERS
function showSuccess(msg){
  const el = document.getElementById("msg");
  el.className = "success";
  el.innerText = msg;
}

function showError(msg){
  const el = document.getElementById("msg");
  el.className = "error";
  el.innerText = msg;
}
</script>

</body>
</html>
