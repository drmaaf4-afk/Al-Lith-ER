<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="pageTitle">Emergency Department Summary</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="sharedHeader"></div>

  <div class="box">
    <div class="row">
      <a class="nav-link" href="index.html">Home</a>
      <a class="nav-link" href="planner.html">Planner</a>
    </div>
  </div>

  <div class="box">
    <h2>Month Selection</h2>
    <div class="row">
      <select id="monthSelect" onchange="handleMonthDropdownChange()"></select>
      <button class="secondary" onclick="exportExcel()">Export Excel</button>
    </div>
    <div class="muted">Current month: <strong id="currentMonthLabel"></strong></div>
    <div id="plannerStatus" class="status"></div>
  </div>

  <div class="box">
    <h2>Summary</h2>
    <div id="summaryContent" class="muted">Loading summary...</div>
  </div>

  <script src="app.js"></script>
  <script src="header.js"></script>
  <script>
    function renderCalendar(){}

    function updateSummaryMonthLabel(){
      const el = document.getElementById('currentMonthLabel');
      if(el){
        el.textContent = getCurrentMonthLabel();
      }
    }

    function renderSummary(){
      const summaryEl = document.getElementById('summaryContent');
      if(!summaryEl) return;

      updateSummaryMonthLabel();

      if(!allBookings.length){
        summaryEl.innerHTML = '<div class="muted">No bookings yet.</div>';
        return;
      }

      const counts = {};
      for(const row of allBookings){
        counts[row.doctor] = (counts[row.doctor] || 0) + 1;
      }

      const sorted = Object.entries(counts)
        .sort((a,b) => b[1] - a[1] || a[0].localeCompare(b[0]));

      const days = getCurrentDaysArray();
      let html = '';

      html += '<h3 style="margin-bottom:10px;">Total shifts per doctor</h3>';
      html += sorted.map(([doctor, count]) => `
        <div class="summary-item">
          <strong>${escapeHtml(doctor)}</strong>: ${count} shifts (${count * SHIFT_HOURS} hours)
        </div>
      `).join('');

      html += '<div style="height:12px;"></div>';
      html += `<h3 style="margin-bottom:10px;">Monthly hours warnings (${MAX_MONTHLY_HOURS} hours)</h3>`;

      const monthlyWarnings = sorted.filter(([doctor, count]) => count * SHIFT_HOURS >= MAX_MONTHLY_HOURS);

      if(monthlyWarnings.length === 0){
        html += `<div class="summary-item">No doctor has reached ${MAX_MONTHLY_HOURS} hours.</div>`;
      } else {
        monthlyWarnings.forEach(([doctor, count]) => {
          html += `
            <div class="summary-item">
              <strong>${escapeHtml(doctor)}</strong>: ${count * SHIFT_HOURS} hours
            </div>
          `;
        });
      }

      html += '<div style="height:12px;"></div>';
      html += '<h3 style="margin-bottom:10px;">Daily rule warnings</h3>';

      const doctorDayCounts = {};
      for(const row of allBookings){
        const key = `${row.doctor}__${row.day}`;
        doctorDayCounts[key] = (doctorDayCounts[key] || 0) + 1;
      }

      const warnings = Object.entries(doctorDayCounts)
        .filter(([_, count]) => count > 3)
        .sort((a, b) => a[0].localeCompare(b[0]));

      if(warnings.length === 0){
        html += `<div class="summary-item">No daily rule violations.</div>`;
      } else {
        warnings.forEach(([key, count]) => {
          const [doctor, day] = key.split('__');
          html += `
            <div class="summary-item">
              <strong>${escapeHtml(doctor)}</strong> on ${escapeHtml(getCurrentMonthName())} ${escapeHtml(day)}: ${count} shifts (maximum is 3)
            </div>
          `;
        });
      }

      html += '<div style="height:12px;"></div>';
      html += '<h3 style="margin-bottom:10px;">Shift leaders</h3>';

      const leaderItems = [];
      for(const day of days){
        for(const time of TIMES){
          const leader = getShiftLeader(day, time);
          if(leader){
            leaderItems.push(`<div class="summary-item">${getCurrentMonthName()} ${day} ${time}: <strong>${escapeHtml(leader)}</strong></div>`);
          }
        }
      }

      html += leaderItems.length
        ? leaderItems.join('')
        : '<div class="summary-item">No shift leaders assigned.</div>';

      html += '<div style="height:12px;"></div>';
      html += '<h3 style="margin-bottom:10px;">On-call doctors</h3>';

      const onCallItems = [];
      for(const day of days){
        for(const time of TIMES){
          const onCall = getShiftOnCall(day, time);
          if(onCall.length){
            onCallItems.push(`<div class="summary-item">${getCurrentMonthName()} ${day} ${time}: <strong>${escapeHtml(onCall.join(', '))}</strong></div>`);
          }
        }
      }

      html += onCallItems.length
        ? onCallItems.join('')
        : '<div class="summary-item">No on-call doctors assigned.</div>';

      html += '<div style="height:12px;"></div>';
      html += '<h3 style="margin-bottom:10px;">Booked shifts</h3>';

      for(const day of days){
        const dayRows = allBookings.filter(r => Number(r.day) === day);
        if(!dayRows.length) continue;

        html += `<div class="summary-item"><strong>${getCurrentMonthName()} ${day}</strong><br>`;
        for(const time of TIMES){
          const rows = dayRows.filter(r => r.time === time);
          if(!rows.length) continue;

          const leader = rows.find(r => r.shift_leader)?.shift_leader || '';
          const onCall = getShiftOnCall(day, time);

          const namesText = rows
            .map(r => {
              let label = r.doctor;
              if(r.doctor === leader) label += ' (Leader)';
              if(onCall.includes(r.doctor)) label += ' (On Call)';
              return label;
            })
            .map(escapeHtml)
            .join(', ');

          html += `${time}: ${namesText}<br>`;
        }
        html += `</div>`;
      }

      summaryEl.innerHTML = html;
    }

    async function initSummary(){
      await initShared();
      renderHeader(`Emergency Department Summary - ${getCurrentMonthLabel()}`);
      updateSummaryMonthLabel();
      setPlannerStatus('Summary loaded.');
    }

    initSummary();
  </script>
</body>
</html>
